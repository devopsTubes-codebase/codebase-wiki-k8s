apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: codebase-wiki
  labels:
    app.kubernetes.io/part-of: codebase-wiki
data:
  # OpenAI / AI config
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  AI_MODEL: "gpt-4-turbo-preview"
  AI_EMBEDDING_MODEL: "text-embedding-3-small"

  # GitHub clone config
  GITHUB_CLONE_TIMEOUT: "300000"
  GITHUB_DEFAULT_BRANCH: "main"

  # Storage paths
  TEMP_STORAGE_PATH: "/tmp/codebase-wiki"
  CLEANUP_TTL: "1800000"
  DOCS_STORAGE_PATH: "/tmp/codebase-wiki-docs"
  VECTOR_INDEX_PATH: "/tmp/codebase-wiki-index"
  MAX_ZIP_SIZE: "52428800"

  # Database connection (non-secret parts)
  DATABASE_HOST: "database-svc"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "codebase_wiki"

  # App config
  NODE_ENV: "production"
  PORT: "4000"
  NEXTAUTH_URL: "http://frontend-svc:3000"
  NEXT_PUBLIC_API_URL: "http://backend-svc:4000"
