apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: codebase-wiki
data:
  backend-metrics.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "Requests/sec",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Backend Request Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(http_requests_total{namespace=\"codebase-wiki\", app=\"backend\"}[5m])",
              "legendFormat": "{{method}} {{path}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "Latency (ms)",
                "drawStyle": "line",
                "fillOpacity": 10
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "Backend Response Latency",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{namespace=\"codebase-wiki\", app=\"backend\"}[5m])) * 1000",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket{namespace=\"codebase-wiki\", app=\"backend\"}[5m])) * 1000",
              "legendFormat": "p50"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "id": 3,
          "title": "CPU Usage per Pod",
          "type": "gauge",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"codebase-wiki\"}[5m])) by (pod) * 100",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "id": 4,
          "title": "Memory Usage per Pod",
          "type": "gauge",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"codebase-wiki\"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace=\"codebase-wiki\"}) by (pod) * 100",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "text": "Down", "color": "red" } }, "type": "value" },
                { "options": { "1": { "text": "Up", "color": "green" } }, "type": "value" }
              ],
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "id": 5,
          "title": "Service Health",
          "type": "stat",
          "targets": [
            {
              "expr": "up{namespace=\"codebase-wiki\", job=\"codebase-wiki-backend\"}",
              "legendFormat": "Backend"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["codebase-wiki", "backend"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Codebase Wiki - Backend Metrics",
      "uid": "cbw-backend-metrics"
    }

  kubernetes-pods.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Pod Status",
          "type": "table",
          "targets": [
            {
              "expr": "kube_pod_status_phase{namespace=\"codebase-wiki\"}",
              "format": "table",
              "legendFormat": "{{pod}} - {{phase}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 2,
          "title": "Pod Restart Count",
          "type": "timeseries",
          "targets": [
            {
              "expr": "kube_pod_container_status_restarts_total{namespace=\"codebase-wiki\"}",
              "legendFormat": "{{pod}} - {{container}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 3,
          "title": "Network I/O",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(container_network_receive_bytes_total{namespace=\"codebase-wiki\"}[5m])",
              "legendFormat": "{{pod}} - RX"
            },
            {
              "expr": "rate(container_network_transmit_bytes_total{namespace=\"codebase-wiki\"}[5m])",
              "legendFormat": "{{pod}} - TX"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["codebase-wiki", "kubernetes"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "Codebase Wiki - Kubernetes Pods",
      "uid": "cbw-kubernetes-pods"
    }
